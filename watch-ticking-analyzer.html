<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Watch Ticking Analyzer</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #00ff00;
        }
        canvas {
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Enhanced Watch Ticking Analyzer</h1>
    <canvas id="visualizationCanvas"></canvas>
    <script>
        // Disable audio enhancements
        const audioContext = new (window.AudioContext || window.webkitAudioContext)({
            latencyHint: 'balanced',
        });

        // Setup audio capture and analysis
        navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } })
            .then(stream => {
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 8192; // High resolution FFT
                source.connect(analyser);
                visualize(analyser);
            })
            .catch(err => console.error('Audio capture error:', err));

        function visualize(analyser) {
            const canvas = document.getElementById('visualizationCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = 300;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                ctx.fillStyle = 'rgba(18, 18, 18, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i];
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(x, canvas.height - barHeight / 2, barWidth, barHeight / 2);
                    x += barWidth + 1;
                }
            }
            draw();
        }
    </script>
</body>
</html>
